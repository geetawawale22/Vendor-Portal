{% extends 'base.html' %}

{% block content %}
<div class="mb-4">
    <h2 class="mb-1">Create Dispatch</h2>
</div>

<form method="post" enctype="multipart/form-data" class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <div class="section-block mb-4">
            <div class="section-title">Vendor Information</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Vendor Name</label>
                    <input class="form-control" name="vendor_name" required>
                </div>
            </div>
        </div>

        <div class="section-block mb-4">
            <div class="section-title">Vehicle Information</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Vehicle Number</label>
                    <input class="form-control" name="vehicle_number" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Vehicle Type</label>
                    <input class="form-control" name="vehicle_type" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Transporter Name</label>
                    <input class="form-control" name="transporter_name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Driver Name</label>
                    <input class="form-control" name="driver_name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Driver Mobile Number</label>
                    <input class="form-control" name="driver_mobile" maxlength="10" required>
                </div>
            </div>
        </div>

        <div class="section-block mb-4">
            <div class="section-title">Weight and Capacity</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Empty Vehicle Weight</label>
                    <div class="input-group">
                        <input class="form-control" type="number" min="0.01" step="0.01" name="empty_vehicle_weight" required>
                        <select class="form-select" style="max-width: 100px;" name="empty_vehicle_weight_unit" required>
                            <option value="">Unit</option>
                            <option>KG</option>
                            <option>Ton</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Loaded Vehicle Weight</label>
                    <div class="input-group">
                        <input class="form-control" type="number" min="0.01" step="0.01" name="loaded_vehicle_weight" required>
                        <select class="form-select" style="max-width: 100px;" name="loaded_vehicle_weight_unit" required>
                            <option value="">Unit</option>
                            <option>KG</option>
                            <option>Ton</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Vehicle Capacity</label>
                    <div class="input-group">
                        <input class="form-control" type="number" min="0.01" step="0.01" name="vehicle_capacity" required>
                        <select class="form-select" style="max-width: 100px;" name="vehicle_capacity_unit" required>
                            <option value="">Unit</option>
                            <option>KG</option>
                            <option>Ton</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-block mb-4">
            <div class="section-title">Billing Information</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Billing Type</label>
                    <select class="form-select" id="billingType" name="billing_type" required>
                        <option value="">Select Billing Type</option>
                        <option>Rate Per Trip</option>
                        <option>Rate Per Ton</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Rate Amount</label>
                    <input class="form-control" type="number" min="0.01" step="0.01" id="rateAmount" name="rate_amount" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Total Cost</label>
                    <input class="form-control" type="text" id="totalCost" value="0.00" disabled>
                </div>
            </div>
        </div>

        <div class="section-block mb-4">
            <div class="section-title d-flex justify-content-between align-items-center">
                <span>ASN Information</span>
                <button type="button" class="btn btn-sm btn-outline-primary" id="addAsnRow">Add ASN Row</button>
            </div>
            <div class="table-responsive mt-3">
                <table class="table table-bordered dispatch-table" id="asnTable">
                    <thead>
                        <tr>
                            <th>ASN Number</th>
                            <th>Invoice Number</th>
                            <th>Material Type</th>
                            <th>Quantity</th>
                            <th>Unit</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input name="asn_number[]" class="form-control" required></td>
                            <td><input name="invoice_number[]" class="form-control" required></td>
                            <td><input name="asn_material_type[]" class="form-control" required></td>
                            <td><input name="asn_quantity[]" type="number" min="0.01" step="0.01" class="form-control" required></td>
                            <td>
                                <select name="asn_unit[]" class="form-select" required>
                                    <option value="">Select Unit</option>
                                    <option>KG</option>
                                    <option>Ton</option>
                                    <option>Bag</option>
                                    <option>Piece</option>
                                    <option>Drum</option>
                                </select>
                            </td>
                            <td><button type="button" class="btn btn-sm btn-outline-danger remove-row">Remove</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="section-block mb-4">
            <div class="section-title">File Uploads</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Invoice Upload</label>
                    <input type="file" class="form-control" name="invoice_upload" accept=".pdf,.jpg,.jpeg,.png">
                </div>
                <div class="col-md-6">
                    <label class="form-label">ASN Upload</label>
                    <input type="file" class="form-control" name="asn_upload" accept=".pdf,.jpg,.jpeg,.png">
                </div>
            </div>
        </div>

        <div class="create-dispatch-actions">
            <button class="btn btn-primary px-4" type="submit">Save Dispatch</button>
        </div>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
    const tableBody = document.querySelector('#asnTable tbody');
    const addButton = document.getElementById('addAsnRow');
    const emptyWeightInput = document.querySelector('input[name="empty_vehicle_weight"]');
    const emptyWeightUnit = document.querySelector('select[name="empty_vehicle_weight_unit"]');
    const loadedWeightInput = document.querySelector('input[name="loaded_vehicle_weight"]');
    const loadedWeightUnit = document.querySelector('select[name="loaded_vehicle_weight_unit"]');
    const vehicleCapacityInput = document.querySelector('input[name="vehicle_capacity"]');
    const vehicleCapacityUnit = document.querySelector('select[name="vehicle_capacity_unit"]');
    const rateAmountInput = document.getElementById('rateAmount');
    const billingTypeSelect = document.getElementById('billingType');
    const totalCostInput = document.getElementById('totalCost');

    addButton.addEventListener('click', () => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><input name="asn_number[]" class="form-control" required></td>
            <td><input name="invoice_number[]" class="form-control" required></td>
            <td><input name="asn_material_type[]" class="form-control" required></td>
            <td><input name="asn_quantity[]" type="number" min="0.01" step="0.01" class="form-control" required></td>
            <td>
                <select name="asn_unit[]" class="form-select" required>
                    <option value="">Select Unit</option>
                    <option>KG</option>
                    <option>Ton</option>
                    <option>Bag</option>
                    <option>Piece</option>
                    <option>Drum</option>
                </select>
            </td>
            <td><button type="button" class="btn btn-sm btn-outline-danger remove-row">Remove</button></td>
        `;
        tableBody.appendChild(row);
    });

    tableBody.addEventListener('click', (event) => {
        if (!event.target.classList.contains('remove-row')) {
            return;
        }
        if (tableBody.querySelectorAll('tr').length === 1) {
            return;
        }
        event.target.closest('tr').remove();
    });

    function toKg(value, unit) {
        return unit === 'Ton' ? value * 1000 : value;
    }

    function calculateTotalCost() {
        const emptyWeight = parseFloat(emptyWeightInput.value) || 0;
        const loadedWeight = parseFloat(loadedWeightInput.value) || 0;
        const vehicleCapacity = parseFloat(vehicleCapacityInput.value) || 0;
        const rateAmount = parseFloat(rateAmountInput.value) || 0;
        const billingType = billingTypeSelect.value;
        const emptyUnit = emptyWeightUnit.value;
        const loadedUnit = loadedWeightUnit.value;
        const capacityUnit = vehicleCapacityUnit.value;

        if (!billingType || emptyWeight === 0 || loadedWeight === 0 || vehicleCapacity === 0 || rateAmount === 0) {
            totalCostInput.value = '0.00';
            return;
        }

        const emptyKg = toKg(emptyWeight, emptyUnit);
        const loadedKg = toKg(loadedWeight, loadedUnit);
        const capacityKg = toKg(vehicleCapacity, capacityUnit);
        const netKg = Math.abs(loadedKg - emptyKg);
        const chargeableTons = Math.min(netKg, capacityKg) / 1000;

        let totalCost = 0;
        if (billingType === 'Rate Per Trip') {
            totalCost = rateAmount;
        } else if (billingType === 'Rate Per Ton') {
            if (netKg === 0) {
                totalCostInput.value = 'Net weight is 0';
                return;
            }
            totalCost = rateAmount * chargeableTons;
        }

        totalCostInput.value = totalCost.toFixed(2);
    }

    emptyWeightInput.addEventListener('input', calculateTotalCost);
    emptyWeightUnit.addEventListener('change', calculateTotalCost);
    loadedWeightInput.addEventListener('input', calculateTotalCost);
    loadedWeightUnit.addEventListener('change', calculateTotalCost);
    vehicleCapacityInput.addEventListener('input', calculateTotalCost);
    vehicleCapacityUnit.addEventListener('change', calculateTotalCost);
    rateAmountInput.addEventListener('input', calculateTotalCost);
    billingTypeSelect.addEventListener('change', calculateTotalCost);
</script>
{% endblock %}
