{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="mb-2">Dispatcher Login</h3>
                <p class="text-muted small mb-4">Enter your username/email and password.</p>

                <form method="post">
                    <div class="mb-3">
                        <label for="identity" class="form-label">Username / Email</label>
                        <input type="text" id="identity" name="identity" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>

                <div class="mt-3 p-2 bg-light rounded small">
                    <strong>Default User:</strong> vendor.user<br>
                    <strong>Password:</strong> Vendor@2026
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
